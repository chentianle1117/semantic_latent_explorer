name: semantic_explorer
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  # Python
  - python=3.10

  # PyTorch and Computer Vision
  - pytorch>=2.0.0
  - torchvision>=0.15.0
  - numpy>=1.24.0
  - pillow>=9.5.0
  - opencv>=4.6.0

  # Scientific Computing
  - scikit-learn>=1.3.0
  - scipy>=1.11.0
  - pandas>=2.0.0

  # Web Framework
  - fastapi=0.109.0
  - uvicorn=0.27.0

  # Pip packages
  - pip
  - pip:
    # CLIP and Embeddings
    - open-clip-torch>=3.2.0

    # Dimensionality Reduction
    - umap-learn>=0.5.3

    # Backend
    - python-multipart==0.0.6
    - websockets==12.0
    - python-jose[cryptography]==3.3.0
    - requests>=2.31.0
    - rembg>=2.0.0

    # AI Agent
    - google-generativeai
    - python-dotenv

    # Utilities
    - tqdm>=4.64.0
