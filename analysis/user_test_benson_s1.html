<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Test Analysis — Benson Session 1</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0d1117; color: #c9d1d9;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  font-size: 13px; line-height: 1.5;
}
.dashboard { max-width: 1800px; margin: 0 auto; padding: 20px 28px 48px; }
.header { margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid rgba(48,54,61,0.6); display: flex; align-items: flex-start; justify-content: space-between; }
.header-left { flex: 1; }
.header-title { font-size: 18px; font-weight: 600; color: #e6edf3; }
.header-sub { font-size: 11px; color: #8b949e; margin-top: 3px; }
.kpi-row { display: flex; gap: 10px; margin-top: 8px; }
.kpi { background: rgba(22,27,34,0.88); border: 1px solid rgba(48,54,61,0.7); border-radius: 7px; padding: 5px 12px; text-align: center; }
.kpi-value { font-size: 16px; font-weight: 700; color: #c9d1d9; }
.kpi-label { font-size: 9px; color: #6e7681; text-transform: uppercase; letter-spacing: 0.5px; }
.view-toggle { display: flex; gap: 0; border: 1px solid rgba(48,54,61,0.7); border-radius: 7px; overflow: hidden; margin-top: 8px; }
.view-btn {
  background: rgba(22,27,34,0.7); color: #8b949e; border: none; padding: 6px 16px;
  font-size: 11px; font-weight: 600; cursor: pointer; letter-spacing: 0.3px;
  transition: background 0.15s, color 0.15s;
}
.view-btn.active { background: rgba(88,166,255,0.15); color: #c9d1d9; }
.view-btn:hover:not(.active) { background: rgba(48,54,61,0.5); }
.legend-row { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 10px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: #8b949e; }
.leg-sw { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.leg-sw.diamond { border-radius: 2px; transform: rotate(45deg); width: 8px; height: 8px; }
.leg-sw.ring { background: transparent !important; border: 2px solid; }
.tracks-container { background: rgba(13,17,23,0.6); border: 1px solid rgba(48,54,61,0.5); border-radius: 10px; overflow: hidden; }
.track { position: relative; border-bottom: 1px solid rgba(48,54,61,0.3); }
.track:last-child { border-bottom: none; }
.track-label {
  position: absolute; left: 0; top: 0; width: 110px; height: 100%;
  display: flex; align-items: center; justify-content: center;
  background: rgba(22,27,34,0.75); border-right: 1px solid rgba(48,54,61,0.4);
  font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.7px;
  color: #8b949e; text-align: center; padding: 4px; z-index: 2;
}
.track svg { display: block; width: 100%; }
.tooltip {
  position: fixed; pointer-events: none;
  background: rgba(22,27,34,0.95); backdrop-filter: blur(10px);
  border: 1px solid rgba(48,54,61,0.8); border-radius: 7px;
  padding: 8px 11px; font-size: 11px; max-width: 300px;
  z-index: 1000; opacity: 0; transition: opacity 0.12s ease;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}
.tooltip.visible { opacity: 1; }
.tt-time { color: #58a6ff; font-weight: 600; font-size: 10px; margin-bottom: 2px; }
.tt-title { color: #e6edf3; font-weight: 600; margin-bottom: 1px; }
.tt-quote { color: #a5d6ff; font-style: italic; margin-top: 3px; font-size: 10px; }
.tt-detail { color: #8b949e; font-size: 10px; }

.time-axis-track { background: rgba(22,27,34,0.5); }
.time-axis-track .tick text { fill: #8b949e; font-size: 10px; }
.time-axis-track .tick line, .time-axis-track .domain { stroke: rgba(48,54,61,0.6); }
/* ── Quotes / Transcript view ─────────────────────────────── */
#quotes-view { display:none; padding:16px 20px 0;
  background:rgba(13,17,23,0.6); border:1px solid rgba(48,54,61,0.5);
  border-radius:10px; margin-top:0; }
/* Filter pill row */
.qv-filter { display:flex; flex-wrap:wrap; gap:6px; padding:10px 0 10px; align-items:center; }
.qv-filter-label { font-size:9px; color:#6e7681; text-transform:uppercase;
  letter-spacing:0.5px; margin-right:4px; }
.qv-pill { display:flex; align-items:center; gap:5px; padding:4px 11px;
  border-radius:20px; cursor:pointer; font-size:9px; font-weight:700;
  letter-spacing:0.4px; text-transform:uppercase;
  border:1px solid var(--pc, #8b949e); color:var(--pc, #8b949e);
  background:transparent; transition:opacity 0.15s; white-space:nowrap; }
.qv-pill::before { content:''; width:5px; height:5px; border-radius:50%;
  background:var(--pc, #8b949e); flex-shrink:0; }
.qv-pill.off { opacity:0.2; }
/* Cards area */
.qv-area { padding:4px 0 80px; }
.qv-section { margin-bottom:20px; }
.qv-sec-hdr { font-size:9px; font-weight:700; letter-spacing:0.7px;
  text-transform:uppercase; color:var(--phclr, #6e7681);
  display:flex; align-items:center; gap:8px; margin:0 0 8px; }
.qv-sec-hdr::before { content:''; width:4px; height:4px; border-radius:50%;
  background:currentColor; flex-shrink:0; }
.qv-sec-hdr::after { content:''; flex:1; height:1px;
  background:var(--phclr, #6e7681); opacity:0.25; }
/* 2-column grid */
.qv-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:8px; }
/* Quote card */
.qv-card { background:rgba(22,27,34,0.88); border:1px solid rgba(48,54,61,0.45);
  border-left:3px solid var(--cc, #8b949e); border-radius:0 8px 8px 0;
  padding:10px 14px; cursor:pointer;
  transition:background 0.12s, box-shadow 0.12s; }
.qv-card:hover { background:rgba(30,37,48,0.98);
  box-shadow:0 2px 14px rgba(0,0,0,0.45); }
.qv-card.qv-david { opacity:0.6; border-left-color:rgba(139,148,158,0.4); }
.qv-card.qv-hidden { display:none; }
.qv-card.expanded .qv-text { -webkit-line-clamp:unset; overflow:visible; }
/* Card meta row */
.qv-meta { display:flex; align-items:center; gap:6px; margin-bottom:7px; }
.qv-who { font-size:9px; font-weight:700; letter-spacing:0.4px;
  text-transform:uppercase; color:var(--cc, #8b949e); }
.qv-ts { font-size:9px; color:#6e7681; margin-left:4px; }
.qv-cat { font-size:8px; font-weight:600; padding:2px 7px; border-radius:10px;
  border:1px solid; background:rgba(0,0,0,0.25); margin-left:auto; }
/* Quote text */
.qv-text { font-size:11px; line-height:1.55; color:#c9d1d9; font-style:italic;
  display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical;
  overflow:hidden; }
.qv-expand-hint { font-size:9px; color:#484f58; margin-top:4px; }
.qv-card.expanded .qv-expand-hint { display:none; }
/* Timeline strip — sticky at bottom */
.qv-timeline { position:sticky; bottom:0; z-index:10;
  background:rgba(13,17,23,0.96); border-top:1px solid rgba(48,54,61,0.5);
  backdrop-filter:blur(6px); margin:0 -20px; padding:0; }
/* qdetail hidden — no longer used */
#qdetail { display:none !important; }
/* ── Survey view ─────────────────────────────────────────── */
#survey-view { display:none; padding:16px 20px 24px;
  background:rgba(13,17,23,0.6); border:1px solid rgba(48,54,61,0.5);
  border-radius:10px; margin-top:0; }
.sv-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.sv-card { background:rgba(22,27,34,0.88); border:1px solid rgba(48,54,61,0.7);
  border-radius:10px; padding:18px 22px; }
.sv-card-title { font-size:13px; font-weight:700; color:#e6edf3; margin-bottom:12px;
  border-bottom:1px solid rgba(48,54,61,0.5); padding-bottom:8px; letter-spacing:0.3px; }
.sv-card-title span { font-size:10px; font-weight:400; color:#6e7681; margin-left:8px; }
/* Pre-study */
.sv-label { font-size:10px; color:#6e7681; text-transform:uppercase; letter-spacing:0.5px;
  margin:10px 0 4px; }
.sv-value { font-size:12px; color:#c9d1d9; margin-bottom:6px; }
.sv-chips { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:6px; }
.sv-chip { font-size:9px; padding:3px 8px; border-radius:12px;
  background:rgba(88,166,255,0.12); color:#58a6ff; border:1px solid rgba(88,166,255,0.25); }
.sv-chip.warn { background:rgba(212,160,84,0.1); color:#d4a054; border-color:rgba(212,160,84,0.25); }
.sv-likert-row { display:flex; align-items:center; gap:8px; margin:5px 0; }
.sv-likert-label { font-size:10px; color:#8b949e; width:160px; flex-shrink:0; line-height:1.3; }
.sv-likert-bar { flex:1; height:16px; background:rgba(48,54,61,0.7); border-radius:8px;
  position:relative; overflow:hidden; }
.sv-likert-fill { height:100%; border-radius:7px; transition:width 0.5s ease; }
.sv-likert-val { font-size:10px; font-weight:700; color:#c9d1d9; width:28px; text-align:right; }
/* CSI */
.sv-csi-big { text-align:center; margin:8px 0 16px; }
.sv-csi-score { font-size:52px; font-weight:800; color:#e6edf3; line-height:1; }
.sv-csi-label { font-size:10px; color:#6e7681; margin-top:2px; letter-spacing:0.5px; text-transform:uppercase; }
.sv-csi-grade { font-size:14px; font-weight:700; margin-left:8px; }
.sv-csi-formula { font-size:10px; color:#484f58; font-family:monospace; text-align:center;
  margin:4px 0 14px; }
.sv-factor-table { width:100%; border-collapse:collapse; font-size:10px; }
.sv-factor-table th { text-align:left; color:#6e7681; font-weight:600;
  padding:4px 6px; border-bottom:1px solid rgba(48,54,61,0.5); text-transform:uppercase;
  font-size:9px; letter-spacing:0.3px; }
.sv-factor-table td { padding:5px 6px; border-bottom:1px solid rgba(48,54,61,0.2); color:#c9d1d9; }
.sv-factor-table tr:last-child td { border-bottom:none; font-weight:700; color:#e6edf3; }
.sv-bar-cell { position:relative; }
.sv-factor-bar { height:12px; border-radius:6px; display:inline-block; vertical-align:middle;
  min-width:4px; transition:width 0.5s ease; }
.sv-count-dot { display:inline-block; width:14px; height:14px; border-radius:50%;
  text-align:center; line-height:14px; font-size:8px; font-weight:700; color:#0d1117; }
.sv-radar { margin:16px auto 0; display:block; }
/* Full-width bottom card */
.sv-full { grid-column:1 / -1; }
.batch-label { font-size: 8px; fill: rgba(139,148,158,0.5); text-anchor: middle; }
@media print {
  body { background: #fff; color: #1a1a1a; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .tooltip { display: none; } .view-toggle { display: none; }
}
</style>
</head>

<div class="dashboard">

    <div class="header-left">
      <div class="header-title">User Test Analysis: Process Timeline</div>
      <div class="header-sub">
        <strong>Benson (Beichen Xie)</strong> &mdash; Footwear Designer &mdash; Session 1
        &nbsp;|&nbsp; Task: Futuristic trail runner &times; Doge meme
        &nbsp;|&nbsp; 58 min 55 sec
      </div>
      <div class="kpi-row">
        <div class="kpi"><div class="kpi-value">16</div><div class="kpi-label">Batches</div></div>
        <div class="kpi"><div class="kpi-value">26</div><div class="kpi-label">Images</div></div>
        <div class="kpi"><div class="kpi-value">3</div><div class="kpi-label">Starred</div></div>

      </div>
    </div>
    <div>
      <div style="font-size:10px;color:#6e7681;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px">View Mode</div>
      <div style="display:flex;gap:8px;align-items:center">
        <div class="view-toggle">
          <button class="view-btn active" id="btn-timeline">Timeline</button>
          <button class="view-btn" id="btn-batch">Batch</button>
          <button class="view-btn" id="btn-thumbnail">Thumbnail</button>
          <button class="view-btn" id="btn-quotes">Quotes</button>
          <button class="view-btn" id="btn-survey">Survey</button>
        </div>
        <div class="view-toggle" style="margin-left:2px">
          <button class="view-btn active" id="btn-curved">Curved</button>
          <button class="view-btn" id="btn-straight">Straight</button>
        </div>
      </div>
    </div>
  </div>
  <div class="legend-row" id="legend"></div>
  <div style="margin-top:0">
    <div class="tracks-container" id="tracks"></div>
    <div id="quotes-view"></div>
    <div id="survey-view"></div>
  </div>
  <div id="qdetail">
    <button id="qdetail-close" title="Close">&times;</button>
    <div id="qdetail-cat"></div>
    <div id="qdetail-who"></div>
    <div id="qdetail-ts"></div>
    <div id="qdetail-text"></div>
  </div>

</div>
<div class="tooltip" id="tooltip">
  <div class="tt-time" id="tt-time"></div>
  <div class="tt-title" id="tt-title"></div>
  <div class="tt-detail" id="tt-detail"></div>
  <div class="tt-quote" id="tt-quote"></div>
</div>

function nodeColor(n) {
  if (n.src === "agent")    return C.agent;    // purple
  if (n.src === "external") return C.external; // orange
  return C.reference; // blue — user iteration (batch + reference unified)
}

const W = Math.min(1800, window.innerWidth - 56);
const plotW = W - ML - MR;
let viewMode = "timeline";
let edgeStyle = "curved"; // "curved" | "straight"

function xTimeline(t) { return ML + (t / DUR) * plotW; }
function xBatch(batchIdx) { return ML + ((batchIdx + 0.5) / BATCHES.length) * plotW; }
function getX(node) {
  const b = BATCHES[node.batch];
  return viewMode === "timeline" ? xTimeline(b.t) : xBatch(node.batch);
}
function getXraw(t, batchIdx) {
  return viewMode === "timeline" ? xTimeline(t) : xBatch(batchIdx);
}

const fmt = s => `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;

const tip = d3.select("#tooltip");
function showTip(ev, d) {
  d3.select("#tt-time").text(d.time != null ? fmt(d.time) : "");
  d3.select("#tt-title").text(d.title || "");
  d3.select("#tt-detail").text(d.detail || "");
  const q = d3.select("#tt-quote");
  q.text(d.quote ? `"${d.quote}"` : "").style("display", d.quote ? "block" : "none");
  tip.classed("visible", true);
  tip.style("left", Math.min(ev.clientX+12,window.innerWidth-320)+"px")
     .style("top", Math.min(ev.clientY-8,window.innerHeight-160)+"px");
}
function moveTip(ev) {
  tip.style("left", Math.min(ev.clientX+12,window.innerWidth-320)+"px")
     .style("top", Math.min(ev.clientY-8,window.innerHeight-160)+"px");
}
function hideTip() { tip.classed("visible", false); }

[

].forEach(l => {

  if (l.cls === "ring") sw.style("background","transparent").style("border-color", l.color);
  el.append("span").text(l.text);
});

// ═══════════════════════════════════════════════════════════════════
function renderAll() {
  d3.select("#tracks").html("");
  const tracks = d3.select("#tracks");
  const useThumbs = viewMode === "thumbnail";
  const useTree   = viewMode !== "timeline";

  function drawPhases(g, h) {
    if (viewMode === "timeline") {
      PHASES.forEach(p => {
        g.append("rect").attr("x", xTimeline(p.start)).attr("y",0)
          .attr("width", xTimeline(p.end)-xTimeline(p.start)).attr("height",h)
          .attr("fill",p.color).attr("opacity",0.03);
      });
      // Faint axis-change division line running through all tracks (Formal/Sporty → Retro/Futuristic)
      const axX = xTimeline(AXES[1].start);
      g.append("line").attr("x1",axX).attr("x2",axX).attr("y1",0).attr("y2",h)
        .attr("stroke","rgba(245,158,11,0.22)").attr("stroke-width",1.5)
        .attr("stroke-dasharray","5 3");
    }
  }

  function drawGrid(g, h) {
    if (viewMode === "timeline") {
      d3.range(10*60, DUR, 10*60).forEach(t => {
        g.append("line").attr("x1",xTimeline(t)).attr("x2",xTimeline(t))
          .attr("y1",0).attr("y2",h)
          .attr("stroke","rgba(48,54,61,0.2)").attr("stroke-width",0.5);
      });
    } else {
      BATCHES.forEach((b,i) => {
        g.append("line").attr("x1",xBatch(i)).attr("x2",xBatch(i))
          .attr("y1",0).attr("y2",h)
          .attr("stroke","rgba(48,54,61,0.12)").attr("stroke-width",0.5);
      });
    }
  }

  // ─── TRACK 1: GENEALOGY TREE ───
  (function() {
    const thumbSize = 64;
    let h = useTree ? 700 : 320; // updated dynamically for tree layout
    const div = tracks.append("div").attr("class","track");
    div.append("div").attr("class","track-label").html("Design<br>Genealogy");
    const svg = div.append("svg").attr("width",W).attr("height",h);
    const defs = svg.append("defs");
    const g = svg.append("g");
    drawPhases(g, h);
    drawGrid(g, h);

    if (viewMode === "timeline") {
      PHASES.forEach(p => {
        g.append("text").attr("x",(xTimeline(p.start)+xTimeline(p.end))/2).attr("y",13)
          .attr("text-anchor","middle").attr("font-size",9)
          .attr("fill",p.color).attr("opacity",0.45).attr("letter-spacing","0.6px")
          .text(p.label.toUpperCase());
      });
    }

    // In thumbnail mode: lanes 0/1/2 map to larger Y spread
    const topPad = useTree ? 180 : 40;
    const botPad = 28;

    // Primary parent = parent with highest batch index (most recent ancestor)
    const primaryPar = {};
    N.forEach(n => {
      if (n.par.length === 0) return;
      let best = n.par[0];
      n.par.forEach(pid => {
        const pBatch = (N.find(x => x.id === pid) || {}).batch ?? -1;
        const bestBatch = (N.find(x => x.id === best) || {}).batch ?? -1;
        if (pBatch > bestBatch) best = pid;
      });
      primaryPar[n.id] = best;
    });

    const pos = {};
    if (!useTree) {
      // Timeline view: 3-lane Y positions
      const laneY = d3.scaleLinear().domain([0, 2]).range([topPad, h - botPad]);
      N.forEach(n => { pos[n.id] = { x: getX(n), y: laneY(n.lane) }; });
    } else {
      // Batch/Thumbnail: d3.tree() layout for minimal edge crossings
      const primChildren = {};
      N.forEach(n => { primChildren[n.id] = []; });
      Object.entries(primaryPar).forEach(([child, par]) => {
        primChildren[par].push(Number(child));
      });
      const roots = N.filter(n => primaryPar[n.id] === undefined).map(n => n.id);
      function buildTreeNode(nid) {
        const kids = primChildren[nid] || [];
        return { id: nid, children: kids.length ? kids.map(buildTreeNode) : undefined };
      }
      const vRoot = { id: -1, children: roots.map(buildTreeNode) };
      // nodeSize ensures minimum (thumbSize+20)px vertical spacing between siblings
      const nodeSpacing = useThumbs ? thumbSize + 8 : 24;
      const treeLayout = d3.tree()
        .nodeSize([nodeSpacing, 1])
        .separation((a, b) => a.parent === b.parent ? 1 : 1.1);
      const hier = d3.hierarchy(vRoot, d => d.children);
      treeLayout(hier);
      // Compute Y range from real nodes (exclude virtual root -1)
      const realDescendants = hier.descendants().filter(d => d.data.id !== -1);
      const yMin = Math.min(...realDescendants.map(d => d.x));
      const yMax = Math.max(...realDescendants.map(d => d.x));
      const yOffset = topPad - yMin;
      // Dynamically update track height to fit the tree
      h = yMax + yOffset + botPad + nodeSpacing / 2;
      svg.attr("height", h);
      // Assign positions
      realDescendants.forEach(d => {
        const n = N.find(x => x.id === d.data.id);
        pos[d.data.id] = { x: getX(n), y: d.x + yOffset };
      });
    }

    // Edges: two-pass — collect, sort secondary by span, draw above-tree arcs
    const edgeG = g.append("g");
    const primEdges = [], secEdges = [];
    N.forEach(n => {
      if (!n.par.length) return;
      n.par.forEach(pid => {
        if (pos[pid] === undefined) return;
        const px = pos[pid].x, py = pos[pid].y;
        const nx = pos[n.id].x, ny = pos[n.id].y;
        const isPrim = !useTree || primaryPar[n.id] === pid;
        const pNode = N.find(x => x.id === pid);
        (isPrim ? primEdges : secEdges).push({ px, py, nx, ny, n, pNode, isPrim });
      });
    });
    // Sort secondary by span desc: widest span → outermost arc (lowest arcY = highest position)
    secEdges.sort((a, b) => Math.abs(b.nx - b.px) - Math.abs(a.nx - a.px));
    const secRailBase = 8, secRailGap = 8;
    function drawEdge(e, secIdx) {
      const mx = (e.px + e.nx) / 2;
      let pathD;
      if (!e.isPrim) {
        // Arc above the tree — stacked rails, wider span = higher arc (smaller arcY)
        const arcY = secRailBase + secIdx * secRailGap;
        pathD = edgeStyle === "straight"
          ? `M${e.px},${e.py} L${e.px},${arcY} L${e.nx},${arcY} L${e.nx},${e.ny}`
          : `M${e.px},${e.py} C${e.px},${arcY} ${e.nx},${arcY} ${e.nx},${e.ny}`;
      } else if (edgeStyle === "straight" && useTree) {
        pathD = `M${e.px},${e.py} L${mx},${e.py} L${mx},${e.ny} L${e.nx},${e.ny}`;
      } else {
        pathD = `M${e.px},${e.py} C${mx},${e.py} ${mx},${e.ny} ${e.nx},${e.ny}`;
      }
      const edgeColor   = !useTree ? C.edge : e.isPrim ? nodeColor(e.n) : nodeColor(e.pNode || e.n);
      const edgeOpacity = !useTree ? 1 : e.isPrim ? 0.65 : 0.3;
      const edgeWidth   = !useTree ? 1.1 : e.isPrim ? 2.0 : 0.9;
      const path = edgeG.append("path")
        .attr("d", pathD)
        .attr("stroke", edgeColor)
        .attr("stroke-width", edgeWidth)
        .attr("opacity", edgeOpacity)
        .attr("fill", "none");
      if (useTree && !e.isPrim) path.attr("stroke-dasharray", "4 3");
    }
    primEdges.forEach(e => drawEdge(e, 0));
    secEdges.forEach((e, i) => drawEdge(e, i));

    // Batch columns
    if (viewMode !== "timeline") {
      BATCHES.forEach((b,i) => {
        const bx = xBatch(i);
        const colW = plotW / BATCHES.length;
        g.append("rect").attr("x", bx - colW/2).attr("y", 0)
          .attr("width", colW).attr("height", h)
          .attr("fill", i%2===0 ? "rgba(255,255,255,0.015)" : "transparent");
      });
    }

    // Nodes
    const nodeG = g.append("g");
    N.forEach(n => {
      const cx = pos[n.id].x, cy = pos[n.id].y;
      const color = nodeColor(n);

      const ng = nodeG.append("g").style("cursor","pointer")
        .on("mouseenter", ev => {
          let det = `${n.src} | ID: ${n.id}`;
          if (n.par.length) det += ` | Parents: ${n.par.join(',')}`;
          if (n.del) det += " | DELETED";
          if (n.star) det += " | \u2605 STARRED";
          const hasKids = N.some(o => o.par.includes(n.id));

          showTip(ev, { time: BATCHES[n.batch].t, title: n.label, detail: det, quote: n.prompt });
        })
        .on("mousemove", moveTip).on("mouseleave", hideTip);

      if (useThumbs) {
        const ts = thumbSize;
        const bw = 1.5;
        const hasChildren = N.some(other => other.par.includes(n.id));
        const isDel = n.del;
        const isStar = n.star;
        // Very subtle neutral border (dark gray outline for all)
        ng.append("rect")
          .attr("x", cx - ts/2 - bw).attr("y", cy - ts/2 - bw)
          .attr("width", ts + bw*2).attr("height", ts + bw*2)
          .attr("rx", 5).attr("fill", "#161b22")
          .attr("stroke", isDel ? "rgba(139,148,158,0.3)" : n.star ? "#fbbf24" : nodeColor(n))
          .attr("stroke-opacity", isDel ? 1 : n.star ? 0.85 : 0.45)
          .attr("stroke-width", isDel ? 1 : n.star ? 1.8 : 1.2);
        // Clip path for rounded corners
        const clipId = `clip-${n.id}`;
        defs.append("clipPath").attr("id", clipId)
          .append("rect").attr("x", cx - ts/2).attr("y", cy - ts/2)
          .attr("width", ts).attr("height", ts).attr("rx", 3);
        // Image (dimmed if deleted)
        if (THUMBS[n.id]) {
          ng.append("image")
            .attr("href", THUMBS[n.id])
            .attr("x", cx - ts/2).attr("y", cy - ts/2)
            .attr("width", ts).attr("height", ts)
            .attr("preserveAspectRatio", "xMidYMid slice")
            .attr("clip-path", `url(#${clipId})`)
            .attr("opacity", isDel ? 0.45 : 1);
          // Faint generation-type tint (10% opacity) so you can read "what made this"
          if (!isDel) ng.append("rect")
            .attr("x", cx - ts/2).attr("y", cy - ts/2)
            .attr("width", ts).attr("height", ts)
            .attr("rx", 3).attr("fill", nodeColor(n)).attr("opacity", 0.1)
            .attr("clip-path", `url(#${clipId})`);
        }

        // Faint red X cross for deleted thumbnails
        if (isDel) {
          const m = 8;
          ng.append("line")
            .attr("x1", cx-ts/2+m).attr("y1", cy-ts/2+m)
            .attr("x2", cx+ts/2-m).attr("y2", cy+ts/2-m)
            .attr("stroke","#f85149").attr("stroke-width",1.5).attr("opacity",0.5);
          ng.append("line")
            .attr("x1", cx+ts/2-m).attr("y1", cy-ts/2+m)
            .attr("x2", cx-ts/2+m).attr("y2", cy+ts/2-m)
            .attr("stroke","#f85149").attr("stroke-width",1.5).attr("opacity",0.5);
        }
        // Star overlay (top-left gold star)
        if (isStar) {
          ng.append("text").attr("x",cx - ts/2 - 1).attr("y",cy - ts/2 + 1)
            .attr("font-size",14).attr("fill","#fbbf24")
            .attr("dominant-baseline","hanging").text("\u2605");
        }
        // ID + status below
        ng.append("text").attr("x",cx).attr("y",cy + ts/2 + 13)
          .attr("text-anchor","middle").attr("font-size",8)
          .attr("fill", isDel ? "#484f58" : "#6e7681")
          .text(`#${n.id}`);

        // Agent badge (top-right)
        if (n.src === "agent") {
          ng.append("circle").attr("cx", cx + ts/2 + 1).attr("cy", cy - ts/2 - 1)
            .attr("r", 7).attr("fill", "#0d1117").attr("stroke", "rgba(168,85,247,0.6)").attr("stroke-width", 1.5);
          ng.append("text").attr("x", cx + ts/2 + 1).attr("y", cy - ts/2)
            .attr("text-anchor","middle").attr("dominant-baseline","central")
            .attr("font-size", 9).attr("fill", "rgba(168,85,247,0.8)").attr("font-weight",700).text("A");
        }
      } else {
        // Circle/diamond nodes
        const r = 6;
        if (n.del) {
          // Red hollow circle for deleted
          ng.append("circle").attr("cx",cx).attr("cy",cy).attr("r",r)
            .attr("fill","none").attr("stroke","#f85149").attr("stroke-width",1.5).attr("opacity",0.8);
        } else if (n.src === "external") {
          ng.append("rect").attr("x",cx-5.5).attr("y",cy-5.5).attr("width",11).attr("height",11)
            .attr("transform",`rotate(45,${cx},${cy})`).attr("fill",color).attr("rx",1.5);
        } else {
          // Starred: gold ring + filled dot
          if (n.star) ng.append("circle").attr("cx",cx).attr("cy",cy).attr("r",r+2.5)
            .attr("fill","none").attr("stroke","#fbbf24").attr("stroke-width",1.3);
          ng.append("circle").attr("cx",cx).attr("cy",cy).attr("r",r).attr("fill",color);
        }
        if (n.src === "agent") {
          ng.append("text").attr("x",cx + r + 4).attr("y",cy + 1)
            .attr("font-size",8).attr("font-weight",700).attr("fill","rgba(168,85,247,0.7)")
            .attr("dominant-baseline","middle").text("A");
        }
        if (n.star) {
          ng.append("text").attr("x",cx).attr("y",cy-12)
            .attr("text-anchor","middle").attr("font-size",11).attr("fill","#fbbf24").text("\u2605");
        }
        ng.append("text").attr("x",cx).attr("y",cy + 15)
          .attr("text-anchor","middle").attr("font-size",7.5).attr("fill","#6e7681")
          .text(n.label.length > 18 ? n.label.slice(0,16)+".." : n.label);
      }
    });

    if (viewMode !== "timeline") {
      BATCHES.forEach((b,i) => {
        g.append("text").attr("class","batch-label")
          .attr("x",xBatch(i)).attr("y",h-4).text(`B${i}`);
      });
    }
  })();

  // ─── TRACK 2: PROMPTS ───
  (function() {
    const h = 62;
    const div = tracks.append("div").attr("class","track");
    div.append("div").attr("class","track-label").style("color","#58a6ff").text("PROMPTS");
    const svg = div.append("svg").attr("width",W).attr("height",h);
    const g = svg.append("g");
    drawPhases(g, h);
    drawGrid(g, h);

    const lg = g.append("g").attr("transform",`translate(${ML+6},5)`);
    [{l:"Tags",c:C.tags},{l:"Mixed",c:C.mixed},{l:"Freetext",c:C.freetext}].forEach((item,i) => {
      lg.append("rect").attr("x",i*70).attr("y",0).attr("width",8).attr("height",8).attr("rx",2).attr("fill",item.c);
      lg.append("text").attr("x",i*70+11).attr("y",8).attr("font-size",9).attr("fill","#6e7681").text(item.l);
    });

    const barW = 11;
    const maxH = h - 20;

    PROMPTS.forEach(p => {
      const bx = getXraw(p.t, p.batch);
      const bh = maxH * 0.5 + (p.snippet.length / 60) * maxH * 0.5;
      const clampH = Math.min(bh, maxH);
      const color = p.mode === "tags" ? C.tags : p.mode === "mixed" ? C.mixed : C.freetext;

      const eg = g.append("g").style("cursor","pointer")
        .on("mouseenter", ev => showTip(ev, { time:p.t, title:`Prompt (${p.mode})`, detail:p.snippet }))
        .on("mousemove", moveTip).on("mouseleave", hideTip);

      eg.append("rect").attr("x",bx-barW/2).attr("y",h-6-clampH)
        .attr("width",barW).attr("height",clampH).attr("rx",3)
        .attr("fill",color).attr("opacity",0.7);
    });
  })();

  // ─── TRACK 3: AXES ───
  (function() {
    const h = 42;
    const div = tracks.append("div").attr("class","track");
    div.append("div").attr("class","track-label").style("color",C.axis).text("AXES");
    const svg = div.append("svg").attr("width",W).attr("height",h);
    const g = svg.append("g");
    drawPhases(g, h);
    drawGrid(g, h);

    const bandH = 20, bandY = (h-bandH)/2;
    AXES.forEach((a,i) => {
      let x1, x2;
      if (viewMode === "timeline") {
        x1 = xTimeline(a.start); x2 = xTimeline(a.end);
      } else {
        const startB = BATCHES.findIndex(b => b.t >= a.start);
        const endB = BATCHES.length - 1 - [...BATCHES].reverse().findIndex(b => b.t <= a.end);
        const colW = plotW / BATCHES.length;
        x1 = xBatch(Math.max(0,startB)) - colW/2;
        x2 = xBatch(Math.min(BATCHES.length-1,endB)) + colW/2;
      }
      const ag = g.append("g").style("cursor","pointer")
        .on("mouseenter", ev => showTip(ev, { time:a.start, title:`${a.left} \u2194 ${a.right}`, detail:`Duration: ${fmt(a.end-a.start)}` }))
        .on("mousemove", moveTip).on("mouseleave", hideTip);
      const periodColor = i === 0 ? C.reference : "#f59e0b";
      ag.append("rect").attr("x",x1).attr("y",bandY).attr("width",x2-x1).attr("height",bandH)
        .attr("rx",4).attr("fill",periodColor).attr("opacity",i === 0 ? 0.15 : 0.18);
      ag.append("rect").attr("x",x1).attr("y",bandY).attr("width",x2-x1).attr("height",bandH)
        .attr("rx",4).attr("fill","none").attr("stroke",periodColor).attr("stroke-width",1).attr("opacity",0.4);
      ag.append("text").attr("x",x1+6).attr("y",bandY+bandH/2+1)
        .attr("dominant-baseline","middle").attr("font-size",9).attr("fill",periodColor).attr("opacity",0.85)
        .text("\u25C0 " + a.left);
      ag.append("text").attr("x",x2-6).attr("y",bandY+bandH/2+1)
        .attr("dominant-baseline","middle").attr("text-anchor","end")
        .attr("font-size",9).attr("fill",periodColor).attr("opacity",0.85)
        .text(a.right + " \u25B6");
      if (i > 0) {
        // Prominent solid division line in the axis track
        g.append("line").attr("x1",x1).attr("x2",x1).attr("y1",2).attr("y2",h-2)
          .attr("stroke","#e6edf3").attr("stroke-width",1.5).attr("opacity",0.65);
      }
    });
  })();

  // ─── TRACK 4: CANVAS ───
  (function() {
    const h = 50;
    const div = tracks.append("div").attr("class","track");
    div.append("div").attr("class","track-label").text("CANVAS");
    const svg = div.append("svg").attr("width",W).attr("height",h);
    const g = svg.append("g");
    drawPhases(g, h);
    drawGrid(g, h);

    CANVAS.forEach(ev => {
      const cx = viewMode === "timeline" ? xTimeline(ev.t)
        : xBatch(BATCHES.reduce((best, b, i) => Math.abs(b.t - ev.t) < Math.abs(BATCHES[best].t - ev.t) ? i : best, 0));
      const eg = g.append("g").style("cursor","pointer")
        .on("mouseenter", e => showTip(e, { time:ev.t, title:ev.label }))
        .on("mousemove", moveTip).on("mouseleave", hideTip);
      eg.append("line").attr("x1",cx).attr("x2",cx).attr("y1",4).attr("y2",h-16)
        .attr("stroke",C.canvas).attr("stroke-width",0.8).attr("opacity",0.4);
      eg.append("text").attr("x",cx).attr("y",h-4)
        .attr("text-anchor","start").attr("transform",`rotate(-60,${cx},${h-4})`)
        .attr("font-size",8).attr("fill",C.canvas).text(ev.label);
    });
  })();

  // ─── TIME AXIS ───
  (function() {
    const h = 32;
    const div = tracks.append("div").attr("class","track time-axis-track");
    const svg = div.append("svg").attr("width",W).attr("height",h);
    if (viewMode === "timeline") {
      const scale = d3.scaleLinear().domain([0,DUR]).range([ML,ML+plotW]);
      const axis = d3.axisBottom(scale)
        .tickValues(d3.range(0, DUR+1, 5*60))
        .tickFormat(d => fmt(d)).tickSize(5);
      svg.append("g").attr("transform","translate(0,4)").call(axis);
    } else {
      const g = svg.append("g");
      BATCHES.forEach((b,i) => {
        const bx = xBatch(i);
        g.append("text").attr("x",bx).attr("y",14)
          .attr("text-anchor","middle").attr("font-size",8).attr("fill","#6e7681").text(`B${i}`);
        g.append("text").attr("x",bx).attr("y",24)
          .attr("text-anchor","middle").attr("font-size",7).attr("fill","#484f58").text(fmt(b.t));
      });
    }
  })();
}

renderAll();

// ═══════════════════════════════════════════════════════════════════
// Quotes / Transcript view
// ═══════════════════════════════════════════════════════════════════
function renderQuotes() {
  const container = d3.select('#quotes-view');
  container.html('');

  const maxT = Math.max(DUR + 300, ...QUOTES.map(q => q.sec)) + 240;
  const xQ = d => ML + (d / maxT) * plotW;
  const sorted = [...QUOTES].sort((a, b) => a.sec - b.sec);

  // Helper: assign phase label by time
  const getPhase = sec => {
    if (sec > DUR) return 'Post-Session Interview';
    for (const p of PHASES) { if (sec >= p.start && sec < p.end) return p.label; }
    return PHASES[PHASES.length - 1].label;
  };

  // Group quotes by phase (preserving phase order)
  const groups = {};
  sorted.forEach(q => { const ph = getPhase(q.sec); if (!groups[ph]) groups[ph] = []; groups[ph].push(q); });
  const phaseOrder = [...PHASES.map(p => p.label), 'Post-Session Interview'].filter(ph => groups[ph]);

  // Active filter set
  const activeCats = new Set(Object.keys(CAT_COLORS));

  // ── Filter bar ──────────────────────────────────────────────────
  const filterBar = container.append('div').attr('class', 'qv-filter');
  filterBar.append('span').attr('class', 'qv-filter-label').text('Filter');
  const usedCats = Object.keys(CAT_COLORS).filter(c => sorted.some(q => q.cat === c));
  usedCats.forEach(cat => {
    const clr = CAT_COLORS[cat];
    filterBar.append('div').attr('class', 'qv-pill').attr('data-cat', cat)
      .style('--pc', clr)
      .on('click', function() {
        const el = d3.select(this);
        const wasOn = !el.classed('off');
        el.classed('off', wasOn);
        if (wasOn) activeCats.delete(cat); else activeCats.add(cat);
        d3.selectAll('.qv-card').each(function(d) {
          d3.select(this).classed('qv-hidden', !activeCats.has(d.cat));
        });
      })
      .append('span').text(cat);
  });

  // Speaker separator + key
  filterBar.append('span').style('width','1px').style('height','14px')
    .style('background','rgba(48,54,61,0.5)').style('margin','0 6px').style('display','inline-block');
  [{who:'Beichen',clr:'#c9d1d9'},{who:'David',clr:'#484f58'}].forEach(s => {
    filterBar.append('span').style('font-size','9px').style('color',s.clr)
      .style('font-weight','700').style('letter-spacing','0.4px')
      .style('text-transform','uppercase').style('padding','0 4px').text(s.who);
  });

  // ── Scrollable cards area ────────────────────────────────────────
  const cardsArea = container.append('div').attr('class', 'qv-area');

  phaseOrder.forEach(ph => {
    if (!groups[ph]) return;
    const sec = cardsArea.append('div').attr('class', 'qv-section');

    // Section header
    const phData = PHASES.find(p => p.label === ph);
    const phClr = phData ? phData.color : 'rgba(245,158,11,0.65)';
    const phLabelText = phData
      ? ph + '  ' + fmt(phData.start) + '\u2013' + fmt(phData.end)
      : 'Post-Session Interview  58:55+';
    sec.append('div').attr('class', 'qv-sec-hdr')
      .style('--phclr', phClr).text(phLabelText);

    const grid = sec.append('div').attr('class', 'qv-grid');

    groups[ph].forEach(q => {
      const isBeichen = q.speaker === 'Beichen';
      const clr = isBeichen ? (CAT_COLORS[q.cat] || '#8b949e') : '#6e7681';
      const cardId = 'qcard-' + q.sec + '-' + q.cat.replace(/\W/g, '');

      const card = grid.append('div').datum(q)
        .attr('class', 'qv-card' + (isBeichen ? '' : ' qv-david'))
        .attr('id', cardId)
        .style('--cc', clr)
        .on('click', function(ev) {
          ev.stopPropagation();
          const el = d3.select(this);
          el.classed('expanded', !el.classed('expanded'));
        });

      // Meta: speaker · timestamp · [category badge]
      const meta = card.append('div').attr('class', 'qv-meta');
      meta.append('span').attr('class', 'qv-who').text(isBeichen ? 'Beichen' : 'David');
      meta.append('span').attr('class', 'qv-ts').text(q.ts);
      meta.append('span').attr('class', 'qv-cat')
        .style('color', clr).style('border-color', clr + '66').text(q.cat);

      // Quote text (clamped to 3 lines, click card to expand)
      card.append('div').attr('class', 'qv-text')
        .text('\u201C' + q.text + '\u201D');
      if (q.text.length > 120)
        card.append('div').attr('class', 'qv-expand-hint').text('Click to expand');
    });
  });

  // ── Timeline strip at bottom (sticky) ───────────────────────────
  const tlH = 72;
  const tl = container.append('div').attr('class', 'qv-timeline');
  const tlSvg = tl.append('svg')
    .attr('width', '100%').attr('height', tlH)
    .attr('viewBox', '0 0 ' + W + ' ' + tlH)
    .attr('preserveAspectRatio', 'none');

  // Phase bands + labels
  PHASES.forEach(p => {
    tlSvg.append('rect')
      .attr('x', xQ(p.start)).attr('y', 0)
      .attr('width', xQ(p.end) - xQ(p.start)).attr('height', tlH)
      .attr('fill', p.color).attr('opacity', 0.08);
    tlSvg.append('text')
      .attr('x', (xQ(p.start) + xQ(p.end)) / 2).attr('y', 13)
      .attr('text-anchor', 'middle').attr('font-size', 9).attr('fill', p.color)
      .attr('opacity', 0.7).text(p.label.toUpperCase());
  });

  // Post-session band
  tlSvg.append('rect')
    .attr('x', xQ(DUR)).attr('y', 0)
    .attr('width', xQ(maxT) - xQ(DUR)).attr('height', tlH)
    .attr('fill', 'rgba(245,158,11,0.06)');
  tlSvg.append('text')
    .attr('x', (xQ(DUR) + xQ(maxT)) / 2).attr('y', 13)
    .attr('text-anchor', 'middle').attr('font-size', 9)
    .attr('fill', 'rgba(245,158,11,0.6)').text('POST-SESSION');

  // Session-end dashed line
  tlSvg.append('line')
    .attr('x1', xQ(DUR)).attr('x2', xQ(DUR)).attr('y1', 16).attr('y2', tlH - 22)
    .attr('stroke', '#6e7681').attr('stroke-width', 1).attr('stroke-dasharray', '4 3');

  // Time axis ticks
  const tlScale = d3.scaleLinear().domain([0, maxT]).range([ML, ML + plotW]);
  const tlAxis = d3.axisBottom(tlScale)
    .tickValues(d3.range(0, maxT, 10 * 60))
    .tickFormat(d => fmt(d)).tickSize(4);
  tlSvg.append('g').attr('transform', 'translate(0,' + (tlH - 18) + ')').call(tlAxis)
    .selectAll('text').attr('fill', '#6e7681').attr('font-size', 9);
  tlSvg.select('.domain').attr('stroke', 'rgba(48,54,61,0.4)');
  tlSvg.selectAll('.tick line').attr('stroke', 'rgba(48,54,61,0.4)');

  // Quote dots — clickable, scroll to card
  sorted.forEach(q => {
    const clr = q.speaker === 'Beichen' ? (CAT_COLORS[q.cat] || '#8b949e') : '#6e7681';
    const dotX = xQ(Math.min(q.sec, maxT - 20));
    const cardId = 'qcard-' + q.sec + '-' + q.cat.replace(/\W/g, '');
    const dotG = tlSvg.append('g').style('cursor', 'pointer')
      .on('click', () => {
        const el = document.getElementById(cardId);
        if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' });
          d3.select('#' + cardId).classed('expanded', true); }
      })
      .on('mouseenter', ev => showTip(ev, {
        time: q.sec <= DUR ? q.sec : null,
        title: q.speaker + '  \u00B7  ' + q.ts,
        detail: q.text.slice(0, 80) + (q.text.length > 80 ? '\u2026' : '')
      }))
      .on('mousemove', moveTip).on('mouseleave', hideTip);
    dotG.append('circle')
      .attr('cx', dotX).attr('cy', tlH - 34).attr('r', 4.5)
      .attr('fill', clr).attr('opacity', 0.82)
      .attr('stroke', '#0d1117').attr('stroke-width', 1);
  });
}

d3.select('#qdetail-close').on('click', function(e) {
  e.stopPropagation();
  d3.select('#qdetail').classed('visible', false);
  if (activeBubble) { activeBubble.classed('active', false); activeBubble = null; }
});

// ═══════════════════════════════════════════════════════════════════
// Survey view — pre-study profile + post-study CSI
// ═══════════════════════════════════════════════════════════════════

const PRE_SURVEY = {
  experience: "2\u20135 years",
  tools: ["2D Sketching (Procreate, Photoshop)", "Vector/Layout (Illustrator)", "3D Modeling (Rhino, Grasshopper)", "AI/Gen Tools (NanoBanana, Midjourney, Firefly, Vizcom)"],
  aiPhases: ["Moodboarding", "Early Ideation", "Refinement", "Final Polish"],
  comfort: 10,
  challenges: ["Lineage/Traceability", "Fixation on early results", "Control over specific regions"],
  attitudes: [
    { label: "AI can help discover solutions I wouldn\u2019t think of", val: 10, tone: "#7dcea0" },
    { label: "Worry AI might reduce creative agency", val: 8, tone: "#d4a054" },
    { label: "Struggle translating intent into prompts", val: 7, tone: "#d4a054" },
    { label: "View AI as collaborator (not just tool)", val: 10, tone: "#7dcea0" },
  ],
};

const CSI_FACTORS = [
  { name: "Collaboration",      items: [8, null], score: 8,  count: 0, color: "#6e7681", note: "N/A (solo session)" },
  { name: "Enjoyment",          items: [10, 10],  score: 20, count: 1, color: "#7dcea0" },
  { name: "Exploration",        items: [7, 10],   score: 17, count: 3, color: "#7eb8da" },
  { name: "Expressiveness",     items: [6, 7],    score: 13, count: 4, color: "#d4a054" },
  { name: "Immersion",          items: [7, 7],    score: 14, count: 2, color: "#a78bca" },
  { name: "Results Worth Effort",items:[8, 10],   score: 18, count: 5, color: "#5ec4b6" },
];

const CSI_ITEM_LABELS = [
  ["Others could work with me easily", "Easy to share ideas/designs"],
  ["Happy to use regularly", "Enjoyed using the tool"],
  ["Easy to explore many ideas", "Helpful to track different possibilities"],
  ["Able to be very creative", "Allowed me to be very expressive"],
  ["Attention fully tuned to activity", "Became absorbed, forgot about tool"],
  ["Satisfied with what I produced", "Output worth the effort"],
];

function csiTotal() {
  return CSI_FACTORS.reduce((s, f) => s + f.score * f.count, 0) / 3;
}

function csiGrade(score) {
  if (score >= 90) return { letter: "A", color: "#22c55e" };
  if (score >= 80) return { letter: "B+", color: "#58a6ff" };
  if (score >= 70) return { letter: "B", color: "#58a6ff" };
  if (score >= 60) return { letter: "C", color: "#f59e0b" };
  if (score >= 50) return { letter: "D", color: "#f97316" };
  return { letter: "F", color: "#f85149" };
}

function renderSurvey() {
  const container = d3.select('#survey-view');
  container.html('');
  const grid = container.append('div').attr('class', 'sv-grid');

  // ── Card 1: Pre-Study Profile ──────────────────────────────────
  const pre = grid.append('div').attr('class', 'sv-card');
  pre.append('div').attr('class', 'sv-card-title')
    .html('Pre-Study Survey <span>Design Experience & AI Attitudes</span>');

  pre.append('div').attr('class', 'sv-label').text('Professional Experience');
  pre.append('div').attr('class', 'sv-value').text(PRE_SURVEY.experience);

  pre.append('div').attr('class', 'sv-label').text('Software Tools');
  const tc = pre.append('div').attr('class', 'sv-chips');
  PRE_SURVEY.tools.forEach(t => tc.append('span').attr('class', 'sv-chip').text(t));

  pre.append('div').attr('class', 'sv-label').text('AI Phases Used');
  const ac = pre.append('div').attr('class', 'sv-chips');
  PRE_SURVEY.aiPhases.forEach(p => ac.append('span').attr('class', 'sv-chip').text(p));

  pre.append('div').attr('class', 'sv-label').text('AI Integration Comfort');
  const comf = pre.append('div').attr('class', 'sv-likert-row');
  comf.append('div').attr('class', 'sv-likert-bar')
    .append('div').attr('class', 'sv-likert-fill')
    .style('width', (PRE_SURVEY.comfort * 10) + '%')
    .style('background', '#58a6ff').style('opacity', 0.85);
  comf.append('div').attr('class', 'sv-likert-val').text(PRE_SURVEY.comfort + '/10');

  pre.append('div').attr('class', 'sv-label').text('Top Challenges');
  const chc = pre.append('div').attr('class', 'sv-chips');
  PRE_SURVEY.challenges.forEach(c => chc.append('span').attr('class', 'sv-chip warn').text(c));

  pre.append('div').attr('class', 'sv-label').text('AI Attitude Statements (1\u201310)');
  PRE_SURVEY.attitudes.forEach(a => {
    const row = pre.append('div').attr('class', 'sv-likert-row');
    row.append('div').attr('class', 'sv-likert-label').text(a.label);
    const bar = row.append('div').attr('class', 'sv-likert-bar');
    bar.append('div').attr('class', 'sv-likert-fill')
      .style('width', (a.val * 10) + '%')
      .style('background', a.tone || '#58a6ff').style('opacity', 0.8);
    row.append('div').attr('class', 'sv-likert-val').text(a.val);
  });

  // ── Card 2: Post-Study CSI Score ───────────────────────────────
  const post = grid.append('div').attr('class', 'sv-card');
  post.append('div').attr('class', 'sv-card-title')
    .html('Post-Study CSI <span>Creativity Support Index (Cherry & Latulipe, 2014)</span>');

  const score = csiTotal();
  const grade = csiGrade(score);
  const big = post.append('div').attr('class', 'sv-csi-big');
  big.append('div').attr('class', 'sv-csi-score')
    .html(score.toFixed(1) + '<span class="sv-csi-grade" style="color:' + grade.color + '">' + grade.letter + '</span>');
  big.append('div').attr('class', 'sv-csi-label').text('Overall CSI Score (0\u2013100)');

  post.append('div').attr('class', 'sv-csi-formula')
    .text('CSI = \u03A3(Factor_Score \u00D7 Factor_Count) / 3 = '
      + CSI_FACTORS.map(f => f.score + '\u00D7' + f.count).join(' + ')
      + ' = ' + (score * 3).toFixed(0) + ' / 3 = ' + score.toFixed(1));

  // Factor table
  const tbl = post.append('table').attr('class', 'sv-factor-table');
  const thead = tbl.append('thead').append('tr');
  ['Factor', 'Item 1', 'Item 2', 'Score (/20)', 'Weight', 'Weighted', 'Bar'].forEach(h =>
    thead.append('th').text(h));

  const tbody = tbl.append('tbody');
  const maxWeighted = Math.max(...CSI_FACTORS.map(f => f.score * f.count));

  CSI_FACTORS.forEach((f, i) => {
    const weighted = f.score * f.count;
    const tr = tbody.append('tr');
    tr.append('td').style('color', f.color).style('font-weight', 600).text(f.name);
    tr.append('td').text(f.items[0] !== null ? f.items[0] : '\u2014');
    tr.append('td').text(f.items[1] !== null ? f.items[1] : 'N/A');
    tr.append('td').style('font-weight', 600).text(f.score);
    const cd = tr.append('td');
    cd.append('span').attr('class', 'sv-count-dot')
      .style('background', f.count > 0 ? f.color : 'rgba(48,54,61,0.5)')
      .text(f.count);
    tr.append('td').style('font-weight', 600).text(weighted);
    const barTd = tr.append('td').attr('class', 'sv-bar-cell').style('width', '120px');
    barTd.append('span').attr('class', 'sv-factor-bar')
      .style('width', (maxWeighted > 0 ? (weighted / maxWeighted) * 100 : 0) + 'px')
      .style('background', f.color).style('opacity', 0.85);
    if (f.note) tr.select('td:nth-child(3)').style('color', '#484f58').style('font-style', 'italic');
  });

  // Totals row
  const totR = tbody.append('tr');
  totR.append('td').text('TOTAL');
  totR.append('td');
  totR.append('td');
  const totScore = CSI_FACTORS.reduce((s, f) => s + f.score, 0);
  totR.append('td').text(totScore);
  totR.append('td').text('15');
  totR.append('td').text((score * 3).toFixed(0));
  totR.append('td').text('\u00F7 3 = ' + score.toFixed(1));

  // ── Radar chart (D3 SVG) ───────────────────────────────────────
  const radarW = 240, radarH = 240, radarR = 90;
  const radarCx = radarW / 2, radarCy = radarH / 2;
  const factors6 = CSI_FACTORS.filter(f => f.count > 0 || f.score > 0);
  const angleStep = (2 * Math.PI) / factors6.length;

  const radarSvg = post.append('svg').attr('class', 'sv-radar')
    .attr('width', radarW).attr('height', radarH);

  // Grid rings
  [0.25, 0.5, 0.75, 1.0].forEach(frac => {
    const r = radarR * frac;
    radarSvg.append('circle').attr('cx', radarCx).attr('cy', radarCy).attr('r', r)
      .attr('fill', 'none').attr('stroke', 'rgba(48,54,61,0.6)').attr('stroke-width', 0.7);
  });

  // Axes + labels
  factors6.forEach((f, i) => {
    const angle = -Math.PI / 2 + i * angleStep;
    const lx = radarCx + (radarR + 18) * Math.cos(angle);
    const ly = radarCy + (radarR + 18) * Math.sin(angle);
    radarSvg.append('line')
      .attr('x1', radarCx).attr('y1', radarCy)
      .attr('x2', radarCx + radarR * Math.cos(angle))
      .attr('y2', radarCy + radarR * Math.sin(angle))
      .attr('stroke', 'rgba(48,54,61,0.3)').attr('stroke-width', 0.5);
    radarSvg.append('text').attr('x', lx).attr('y', ly)
      .attr('text-anchor', Math.abs(Math.cos(angle)) < 0.1 ? 'middle' : Math.cos(angle) > 0 ? 'start' : 'end')
      .attr('dominant-baseline', 'middle')
      .attr('font-size', 8).attr('fill', f.color).attr('font-weight', 600)
      .text(f.name.replace('Results Worth Effort', 'Results'));
  });

  // Data polygon (score/20 normalized)
  const points = factors6.map((f, i) => {
    const angle = -Math.PI / 2 + i * angleStep;
    const r = (f.score / 20) * radarR;
    return [radarCx + r * Math.cos(angle), radarCy + r * Math.sin(angle)];
  });
  radarSvg.append('polygon')
    .attr('points', points.map(p => p.join(',')).join(' '))
    .attr('fill', 'rgba(88,166,255,0.15)').attr('stroke', '#58a6ff')
    .attr('stroke-width', 1.5).attr('opacity', 0.8);

  // Dots
  points.forEach((p, i) => {
    radarSvg.append('circle').attr('cx', p[0]).attr('cy', p[1]).attr('r', 3)
      .attr('fill', factors6[i].color).attr('stroke', '#0d1117').attr('stroke-width', 1);
  });

  // ── Card 3: CSI Item Details (full-width) ──────────────────────
  const detail = grid.append('div').attr('class', 'sv-card sv-full');
  detail.append('div').attr('class', 'sv-card-title')
    .html('CSI Statement Responses <span>12 agreement items + 15 paired comparisons</span>');

  CSI_FACTORS.forEach((f, fi) => {
    const row = detail.append('div').style('margin-bottom', '8px');
    row.append('span').style('font-size', '11px').style('font-weight', 700)
      .style('color', f.color).text(f.name);
    if (f.note) row.append('span').style('font-size', '9px').style('color', '#484f58')
      .style('margin-left', '8px').text('(' + f.note + ')');

    CSI_ITEM_LABELS[fi].forEach((label, ii) => {
      const val = f.items[ii];
      const lr = detail.append('div').attr('class', 'sv-likert-row').style('margin-left', '12px');
      lr.append('div').attr('class', 'sv-likert-label').style('width', '260px').text(label);
      const bar = lr.append('div').attr('class', 'sv-likert-bar');
      bar.append('div').attr('class', 'sv-likert-fill')
        .style('width', val !== null ? (val * 10) + '%' : '0%')
        .style('background', f.color).style('opacity', 0.8);
      lr.append('div').attr('class', 'sv-likert-val')
        .text(val !== null ? val : 'N/A').style('color', val === null ? '#484f58' : '#c9d1d9');
    });
  });

  // Paired comparison summary
  detail.append('div').style('margin-top', '14px')
    .append('div').attr('class', 'sv-label').text('Paired Factor Comparisons (15 total)');
  const compRow = detail.append('div').style('display', 'flex').style('gap', '8px').style('flex-wrap', 'wrap').style('margin-top', '4px');
  CSI_FACTORS.forEach(f => {
    const chipBg = f.count > 0 ? f.color + '14' : 'transparent';
    const chipBdr = f.count > 0 ? f.color + '55' : 'rgba(48,54,61,0.3)';
    const chip = compRow.append('div').style('display', 'flex').style('align-items', 'center').style('gap', '4px')
      .style('padding', '4px 10px').style('border-radius', '14px')
      .style('background', chipBg)
      .style('border', '1px solid ' + chipBdr);
    chip.append('span').style('font-size', '10px').style('color', f.count > 0 ? f.color : '#484f58')
      .style('font-weight', 600).text(f.name);
    chip.append('span').style('font-size', '12px').style('font-weight', 800)
      .style('color', f.count > 0 ? '#e6edf3' : '#484f58').text(f.count);
  });

  // ── Card 4: Key Pre→Post Observations (full-width) ────────────
  const obs = grid.append('div').attr('class', 'sv-card sv-full');
  obs.append('div').attr('class', 'sv-card-title').text('Key Observations');

  const bullets = [
    { icon: "\u2B50", text: "Highest weighted factor: <b>Results Worth Effort</b> (score 18, count 5 = 90 weighted) \u2014 output quality mattered most to this designer." },
    { icon: "\uD83C\uDFA8", text: "Expressiveness had the 2nd highest count (4) but lower score (13/20) \u2014 creative freedom was valued but the tool constrained fine-grained control." },
    { icon: "\u26A0\uFE0F", text: "Pre-study concern <i>\"worry AI might reduce creative agency\"</i> (8/10) aligns with post-interview: <i>\"good inspiration, but you're drawn to that direction rather than originated from your thinking.\"</i>" },
    { icon: "\uD83D\uDD0D", text: "Exploration scored 17/20 but was chosen 3/15 times \u2014 exploring was easy, but less critical than producing quality results." },
    { icon: "\uD83E\uDD1D", text: "Collaboration was N/A (solo session) with 0 paired comparison selections. Collaboration score would only apply in multi-user setups." },
    { icon: "\uD83D\uDCA1", text: "Pre-study challenge <i>\"Lineage/Traceability\"</i> directly addressed by the genealogy tree feature; post-session rated tracking/exploration 10/10." },
  ];

  bullets.forEach(b => {
    const p = obs.append('div').style('display', 'flex').style('gap', '8px').style('margin-bottom', '6px')
      .style('align-items', 'flex-start').style('font-size', '11px').style('color', '#8b949e').style('line-height', '1.5');
    p.append('span').style('flex-shrink', 0).style('font-size', '13px').text(b.icon);
    p.append('span').html(b.text);
  });
}

function setView(mode) {
  viewMode = mode;
  ["timeline","batch","thumbnail","quotes","survey"].forEach(m => {
    d3.select(`#btn-${m}`).classed("active", m === mode);
  });
  const isQuotes = mode === "quotes";
  const isSurvey = mode === "survey";
  const isTrack  = !isQuotes && !isSurvey;
  d3.select("#tracks").style("display", isTrack ? null : "none");
  d3.select("#quotes-view").style("display", isQuotes ? "block" : "none");
  d3.select("#survey-view").style("display", isSurvey ? "block" : "none");
  d3.select("#legend").style("display", isTrack ? null : "none");
  // Hide edge-style toggle on non-track views
  d3.selectAll(".view-toggle").filter((d, i) => i === 1)
    .style("display", isTrack ? null : "none");
  if (isQuotes) {
    renderQuotes();
  } else if (isSurvey) {
    renderSurvey();
  } else {
    renderAll();
  }
}
d3.select("#btn-timeline").on("click", () => setView("timeline"));
d3.select("#btn-batch").on("click", () => setView("batch"));
d3.select("#btn-thumbnail").on("click", () => setView("thumbnail"));
d3.select("#btn-quotes").on("click", () => setView("quotes"));
d3.select("#btn-survey").on("click", () => setView("survey"));
d3.select("#btn-curved").on("click", () => {
  edgeStyle = "curved";
  d3.select("#btn-curved").classed("active", true);
  d3.select("#btn-straight").classed("active", false);
  renderAll();
});
d3.select("#btn-straight").on("click", () => {
  edgeStyle = "straight";
  d3.select("#btn-curved").classed("active", false);
  d3.select("#btn-straight").classed("active", true);
  renderAll();
});
</script>
</body>
</html>
